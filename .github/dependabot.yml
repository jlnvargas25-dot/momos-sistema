version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Bogota
    open-pull-requests-limit: 5
    versioning-strategy: increase-if-necessary
    groups:
      production-runtime:
        dependency-type: production
      development-tooling:
        dependency-type: development
    labels:
      - dependencies
      - automated-review

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:20"
      timezone: America/Bogota
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - automated-review
